<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Monthly Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d29; --border: #2a2d3a;
    --text: #e4e4e7; --muted: #9ca3af;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    --purple: #a855f7; --orange: #f97316; --yellow: #eab308; --cyan: #06b6d4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); padding:24px; line-height:1.5; }
  h1 { font-size:28px; font-weight:700; margin-bottom:4px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:8px; }

  /* Page tabs */
  .page-tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:2px solid var(--border); padding-bottom:0; }
  .page-tab {
    padding:12px 24px; cursor:pointer; font-size:15px; font-weight:600;
    color:var(--muted); border:none; background:none;
    border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s;
  }
  .page-tab:hover { color:var(--text); }
  .page-tab.active { color:var(--blue); border-bottom-color:var(--blue); }
  .page-content { display:none; }
  .page-content.active { display:block; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .card-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .card-value { font-size:28px; font-weight:700; }
  .card-change { font-size:13px; margin-top:6px; }
  .card-change.up { color:var(--green); }
  .card-change.down { color:var(--red); }
  .card-note { font-size:11px; color:var(--muted); margin-top:4px; }
  .section { margin-bottom:40px; }
  .section-title { font-size:20px; font-weight:600; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .chart-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .chart-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .chart-full { grid-column:1/-1; }
  .table-container { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; overflow-x:auto; margin-bottom:20px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:right; padding:10px 12px; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child { text-align:left; }
  td { text-align:right; padding:10px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  td:first-child { text-align:left; font-weight:500; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(59,130,246,.05); }
  .pill { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
  .pill-green { background:rgba(34,197,94,.15); color:var(--green); }
  .pill-red { background:rgba(239,68,68,.15); color:var(--red); }
  .pill-yellow { background:rgba(234,179,8,.15); color:var(--yellow); }
  .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .tab {
    padding:8px 16px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer; font-size:13px; transition:all .2s;
  }
  .tab:hover { border-color:var(--blue); color:var(--text); }
  .tab.active { background:var(--blue); color:white; border-color:var(--blue); }
  @media(max-width:900px) { .chart-row { grid-template-columns:1fr; } .cards { grid-template-columns:repeat(2,1fr); } }
  .alert { padding:12px 16px; border-radius:8px; margin-bottom:12px; font-size:13px; }
  .alert-warn { background:rgba(234,179,8,.1); border:1px solid rgba(234,179,8,.3); color:var(--yellow); }
  .alert-danger { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); }
  .alert-ok { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:var(--green); }
  .product-select { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .product-btn {
    padding:6px 14px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer; font-size:12px; transition:all .2s;
  }
  .product-btn:hover { border-color:var(--blue); color:var(--text); }
  .product-btn.active { background:var(--blue); color:white; border-color:var(--blue); }
</style>
</head>
<body>

<h1>Amazon Dashboard</h1>
<p class="subtitle">Datos hasta 2026-04 &middot; BroadCast Calendar</p>

<!-- Page Tabs -->
<div class="page-tabs">
  <button class="page-tab active" onclick="switchPage('general')">Dashboard General</button>
  <button class="page-tab" onclick="switchPage('productos')">Desglose por Producto</button>
  <button class="page-tab" onclick="switchPage('variantes')">Variantes (X1, X2, X3)</button>

<!-- ════════════════════════════════════════════════════════════ -->
<!-- PAGE: GENERAL                                               -->
<!-- ════════════════════════════════════════════════════════════ -->
<div id="page-general" class="page-content active">

<div id="alerts" class="section"></div>
<div class="cards" id="summary-cards"></div>

<div class="section">
  <h2 class="section-title">Ventas & Profit</h2>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-gsales"></div></div>
    <div class="chart-box"><div id="chart-profit-breakdown"></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-qty"></div></div>
    <div class="chart-box"><div id="chart-margin"></div></div>
  </div>
</div>

<div class="section">
  <h2 class="section-title">PPC / Publicidad</h2>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-ppc"></div></div>
    <div class="chart-box"><div id="chart-roas-acos"></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-tacos"></div></div>
    <div class="chart-box"><div id="chart-cpc-vs-total"></div></div>
  </div>
</div>

<div class="section">
  <h2 class="section-title">Rendimiento Semanal Normalizado</h2>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-weekly-profit"></div></div>
    <div class="chart-box"><div id="chart-weekly-qty"></div></div>
  </div>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-weekly-pct"></div></div>
    <div class="chart-box"><div id="chart-net-profit"></div></div>
  </div>
</div>

<div class="section">
  <h2 class="section-title">Por Producto</h2>
  <div class="tabs" id="product-tabs"></div>
  <div class="chart-row">
    <div class="chart-box chart-full"><div id="chart-product-trend"></div></div>
  </div>
  <div class="table-container" id="product-table-container"></div>
</div>

<div class="section">
  <h2 class="section-title">Tabla Resumen Mensual</h2>
  <div class="table-container" id="summary-table"></div>
</div>

</div><!-- /page-general -->

<!-- ════════════════════════════════════════════════════════════ -->
<!-- PAGE: PRODUCTOS                                             -->
<!-- ════════════════════════════════════════════════════════════ -->
<div id="page-productos" class="page-content">

<div class="section">
  <h2 class="section-title">Comparativa de Productos</h2>
  <div class="tabs" id="prod-compare-tabs"></div>
  <div class="chart-row">
    <div class="chart-box chart-full"><div id="chart-prod-compare"></div></div>
  </div>
  <div class="table-container" id="prod-compare-table"></div>
</div>

<div class="section">
  <h2 class="section-title">Detalle por Producto</h2>
  <div class="product-select" id="product-select"></div>
  <div class="chart-row">
    <div class="chart-box"><div id="chart-prod-sales-spend"></div></div>
    <div class="chart-box"><div id="chart-prod-margin-roas"></div></div>
  </div>
  <div class="table-container" id="prod-detail-table"></div>
</div>

<div class="section">
  <h2 class="section-title">Evolución de Productos — Últimos 3 Meses</h2>
  <div class="table-container" id="prod-evolution-table"></div>
</div>

</div><!-- /page-productos -->

<!-- ════════════════════════════════════════════════════════════ -->
<!-- PAGE: VARIANTES                                             -->
<!-- ════════════════════════════════════════════════════════════ -->
<div id="page-variantes" class="page-content">

<div class="section">

  <div class="chart-row">
    <div class="chart-box chart-full"><div id="chart-variants"></div></div>
  </div>
  <div class="table-container" id="variant-table"></div>
</div>

</div><!-- /page-variantes -->

function fmt(n) { return n>=1000?'$'+(n/1000).toFixed(1)+'K':'$'+n.toFixed(0); }
function fmtFull(n) { return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pct(c,p) {
  if(!p) return {val:0,cls:'up',txt:'—'};
  let v=((c-p)/Math.abs(p))*100;
  return {val:v, cls:v>=0?'up':'down', txt:(v>=0?'+':'')+v.toFixed(1)+'%'};
}

// ── PAGE SWITCHING ──────────────────────────────────────────
let currentPage = 'general';
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  event.target.classList.add('active');
  if (page === 'productos' && !prodPageInit) initProductPage();
  if (page === 'variantes' && !varPageInit) initVariantPage();
}

// ── GENERAL PAGE ────────────────────────────────────────────
function renderAlerts() {
  let html='';
  let r=D.roas[D.roas.length-1], a=D.acos[D.acos.length-1], t=D.tacos[D.tacos.length-1];
  if(r<2.5) html+=`<div class="alert alert-danger">ROAS actual: ${r.toFixed(2)}x — por debajo del umbral 2.5x</div>`;
  else if(r<3) html+=`<div class="alert alert-warn">ROAS actual: ${r.toFixed(2)}x — cerca del umbral mínimo</div>`;
  else html+=`<div class="alert alert-ok">ROAS actual: ${r.toFixed(2)}x — saludable</div>`;
  if(a>35) html+=`<div class="alert alert-danger">ACOS actual: ${a.toFixed(1)}% — supera el 35%</div>`;
  if(t>20) html+=`<div class="alert alert-warn">TACoS actual: ${t.toFixed(1)}% — inversión alta vs ventas totales</div>`;
  let qw=D.qweeks[D.qweeks.length-1], mo=MONTHS[MONTHS.length-1];
  if(qw<4) html+=`<div class="alert alert-warn">${mo} tiene solo ${qw} semana(s) — números parciales</div>`;
  document.getElementById('alerts').innerHTML=html;
}

function renderCards() {
  const s=SUMMARY;
  const cards=[
    {label:'Gross Sales',value:fmtFull(s.gsales_current),change:pct(s.gsales_current,s.gsales_prev),note:s.qweeks_current+' semanas'},
    {label:'Net Profit',value:fmtFull(s.profit_current),change:pct(s.profit_current,s.profit_prev)},
    {label:'ROAS',value:s.roas_current.toFixed(2)+'x',change:pct(s.roas_current,s.roas_prev)},
    {label:'Unidades',value:s.qty_current.toLocaleString(),change:pct(s.qty_current,s.qty_prev)},
    {label:'PPC Spend',value:fmtFull(s.ppc_spend_current),change:pct(s.ppc_spend_current,s.ppc_spend_prev)},
    {label:'TACoS',value:s.tacos_current.toFixed(1)+'%',change:pct(s.tacos_current,s.tacos_prev),invert:true},
  ];
  let html='';
  cards.forEach(c=>{
    let cls=c.change.cls; if(c.invert) cls=c.change.val>0?'down':'up';
    html+=`<div class="card"><div class="card-label">${c.label}</div><div class="card-value">${c.value}</div>
    <div class="card-change ${cls}">vs anterior: ${c.change.txt}</div>
    ${c.note?`<div class="card-note">${c.note}</div>`:''}</div>`;
  });
  document.getElementById('summary-cards').innerHTML=html;
}

// ── EVOLUTION TABLE ─────────────────────────────────────────
function renderEvolutionTable() {
  const m3 = MONTHS.slice(-3);
  const i0 = MONTHS.length - 3, i1 = MONTHS.length - 2, i2 = MONTHS.length - 1;

  function arrow(curr, prev) {
    if (!prev || prev === 0) return '<span style="color:var(--muted)">—</span>';
    let pct = ((curr - prev) / Math.abs(prev)) * 100;
    if (pct > 0) return `<span style="color:var(--green)">&#9650; +${pct.toFixed(1)}%</span>`;
    if (pct < 0) return `<span style="color:var(--red)">&#9660; ${pct.toFixed(1)}%</span>`;
    return '<span style="color:var(--muted)">= 0%</span>';
  }

  let html = '<table><thead><tr>';
  html += '<th>Producto</th>';
  m3.forEach(m => { html += `<th colspan="2">${m}</th>`; });
  html += '<th>Tend. Ventas</th><th>Tend. Profit</th>';
  html += '</tr><tr>';
  html += '<th></th>';
  m3.forEach(() => { html += '<th>Ventas</th><th>Net Profit</th>'; });
  html += '<th></th><th></th>';
  html += '</tr></thead><tbody>';

  GROUPED_TOTALS.forEach(g => {
    const d = GROUPED[g.name];
    const s = [d.sales[i0]||0, d.sales[i1]||0, d.sales[i2]||0];
    const n = [d.net_profit[i0]||0, d.net_profit[i1]||0, d.net_profit[i2]||0];

    html += `<tr><td>${g.name}</td>`;
    for (let j = 0; j < 3; j++) {
      html += `<td>${fmtFull(s[j])}</td><td>${fmtFull(n[j])}</td>`;
    }
    html += `<td>${arrow(s[2], s[1])}</td>`;
    html += `<td>${arrow(n[2], n[1])}</td>`;
    html += '</tr>';
  });

  // Totals row
  let ts = [0,0,0], tn = [0,0,0];
  GROUPED_TOTALS.forEach(g => {
    const d = GROUPED[g.name];
    for (let j = 0; j < 3; j++) {
      ts[j] += d.sales[i0+j] || 0;
      tn[j] += d.net_profit[i0+j] || 0;
    }
  });
  html += '<tr style="font-weight:700;border-top:2px solid var(--border)"><td>TOTAL</td>';
  for (let j = 0; j < 3; j++) {
    html += `<td>${fmtFull(ts[j])}</td><td>${fmtFull(tn[j])}</td>`;
  }
  html += `<td>${arrow(ts[2], ts[1])}</td><td>${arrow(tn[2], tn[1])}</td></tr>`;

  html += '</tbody></table>';
  document.getElementById('prod-evolution-table').innerHTML = html;
}

  html += '<th>Variante</th><th>Total Ventas</th><th>Total Profit</th><th>Margin</th><th>Unidades</th>';
  m3.forEach(m => { html += `<th>${m} Ventas</th><th>${m} Qty</th>`; });
  html += '<th>Tend.</th>';
  html += '</tr></thead><tbody>';

  variants.forEach(v => {
    const d = VARIANT_DATA[v.name];
    let mc = v.margin > 60 ? 'pill-green' : v.margin > 40 ? 'pill-yellow' : 'pill-red';

    html += `<tr><td>${v.name}</td>`;
    html += `<td>${fmtFull(v.sales)}</td><td>${fmtFull(v.profit)}</td>`;
    html += `<td><span class="pill ${mc}">${v.margin.toFixed(1)}%</span></td>`;
    html += `<td>${v.qty.toLocaleString()}</td>`;

    m3i.forEach(i => {
      html += `<td>${fmtFull(d.sales[i])}</td><td>${d.qty[i].toLocaleString()}</td>`;
    });

    const s1 = d.sales[m3i[1]], s2 = d.sales[m3i[2]];
    html += `<td>${arrow(s2, s1)}</td>`;
    html += '</tr>';
  });

  // Family total row
  let totS = 0, totP = 0, totQ = 0, mSales = [0,0,0], mQty = [0,0,0];
  variants.forEach(v => {
    const d = VARIANT_DATA[v.name];
    totS += v.sales; totP += v.profit; totQ += v.qty;
    m3i.forEach((mi, j) => { mSales[j] += d.sales[mi]; mQty[j] += d.qty[mi]; });
  });
  let totMg = totS > 0 ? (totP / totS * 100).toFixed(1) : '0.0';
  let totMc = parseFloat(totMg) > 60 ? 'pill-green' : parseFloat(totMg) > 40 ? 'pill-yellow' : 'pill-red';

  html += `<tr style="font-weight:700;border-top:2px solid var(--border)"><td>TOTAL ${selectedFamily}</td>`;
  html += `<td>${fmtFull(totS)}</td><td>${fmtFull(totP)}</td>`;
  html += `<td><span class="pill ${totMc}">${totMg}%</span></td>`;
  html += `<td>${totQ.toLocaleString()}</td>`;
  m3i.forEach((_, j) => {
    html += `<td>${fmtFull(mSales[j])}</td><td>${mQty[j].toLocaleString()}</td>`;
  });
  html += `<td>${arrow(mSales[2], mSales[1])}</td></tr>`;

  html += '</tbody></table>';
  document.getElementById('variant-table').innerHTML = html;
}

renderProductTabs(); chartProductTrend(); renderProductTable(); renderSummaryTable();
